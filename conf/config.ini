#所有相关的配置都放在一个[]节里面
[api_env]
; API 服务器地址 环境配置，不带末尾斜杠
host = http://127.0.0.1:8787

[timeout]
; 接口请求超时，单位秒
api_timeout = 60

[log]
; 日志配置 DEBUG < INFO < WARNING < ERROR
level = DEBUG
; 日志文件存放目录，相对于项目根目录
dir = logs

[mysql]
host = localhost
port = 3306
user = root
password = 123456
database = test_framework
; 是否启用数据库连接（本地无 MySQL 时设为 false）
enabled = true

[redis]
host = localhost
port = 6379
password =
db = 0
; 是否启用 Redis 连接（本地无 Redis 时设为 false）
enabled = true

[login]
; 登录账号配置，避免账号密码硬编码在 Python 源码里
user_name = test01
password = admin123

[token]
; Token 缓存过期时间（秒），Redis 和内存缓存共用此时间
token_expire_seconds = 3600

[report]
; allure = Allure 报告 / html = pytest-html 报告
type = allure

[dingtalk]
; 钉钉机器人通知配置（模块 13）
; enabled: 是否启用钉钉通知
enabled = false
; webhook: 钉钉机器人 webhook 地址
webhook = https://oapi.dingtalk.com/robot/send?access_token=placeholder
; secret: 钉钉机器人加签密钥（安全设置里启用"加签"时填写）
secret = placeholder
; only_on_failure: 是否只在有失败用例时发送通知（防刷屏）
only_on_failure = false
