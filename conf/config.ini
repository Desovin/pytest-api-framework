#所有相关的配置都放在一个[]节里面
[api_env]
; API 服务器地址 环境配置，不带末尾斜杠
host = http://127.0.0.1:8787

[timeout]
; 接口请求超时，单位秒
api_timeout = 60

[log]
; 日志配置 DEBUG < INFO < WARNING < ERROR
level = DEBUG
; 日志文件存放目录，相对于项目根目录
dir = logs

[mysql]
host = localhost
port = 3306
user = root
; 密码通过 .env 文件的 MYSQL_PASSWORD 注入，不在此处硬编码
password =
database = test_framework
; 是否启用数据库连接（本地无 MySQL 时设为 false）
enabled = true

[redis]
host = localhost
port = 6379
; 密码通过 .env 文件的 REDIS_PASSWORD 注入，无密码则留空
password =
db = 0
; 是否启用 Redis 连接（本地无 Redis 时设为 false）
enabled = true

[login]
; 登录账号配置，避免账号密码硬编码在 Python 源码里
user_name = test01
; 密码通过 .env 文件的 LOGIN_PASSWORD 注入，不在此处硬编码
password =

[token]
; Token 缓存过期时间（秒），Redis 和内存缓存共用此时间
token_expire_seconds = 3600

[report]
; allure = Allure 报告 / html = pytest-html 报告
type = allure

[dingtalk]
; 钉钉机器人通知配置（模块 13）
; enabled: 是否启用钉钉通知
enabled = true
; webhook 和 secret 通过 .env 文件或 CI 环境变量注入，不在此处硬编码
; DINGTALK_WEBHOOK / DINGTALK_SECRET
webhook =
secret =
; only_on_failure: 是否只在有失败用例时发送通知（防刷屏）
only_on_failure = false

[mock_server]
; Mock Server 启动配置（模块 9）
; 被测服务地址和端口，测试框架里通过 [api_env] host 引用
host = 127.0.0.1
port = 8787
; debug=true 开启 Flask 自动重载和调试器（本地开发方便，但会启动两个进程）
; debug=false 关闭双进程，跑测试 / CI / 并发 benchmark 更稳定
; 后续切换只需要改这一行
debug = false
