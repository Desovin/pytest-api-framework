- baseInfo:
    api_name: 签收
    url: /logistics/sign
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: waybillNo不存在
      json:
        waybillNo: '999999999999999999'
        signerName: 张三
        signTime: '2024-01-02 10:30:00'
      validation:
        - contains: { msg_code: 4000 }

    - case_name: 缺少签收人
      json:
        waybillNo: ${get_extract_data(wb_seed)}
        signTime: '2024-01-02 10:30:00'
      validation:
        - contains: { msg_code: 9001 }

    - case_name: 缺少签收时间
      json:
        waybillNo: ${get_extract_data(wb_seed)}
        signerName: 张三
      validation:
        - contains: { msg_code: 9001 }

    - case_name: 缺少waybillNo
      json:
        signerName: 张三
        signTime: '2024-01-02 10:30:00'
      validation:
        - contains: { msg_code: 9001 }

    - case_name: waybillNo为空
      json:
        waybillNo: ''
        signerName: 张三
        signTime: '2024-01-02 10:30:00'
      validation:
        - contains: { msg_code: 9001 }
