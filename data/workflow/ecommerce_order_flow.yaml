- baseInfo:
    api_name: 登录获取token
    url: /dar/user/login
    method: POST
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
  testCase:
    - case_name: 电商流程-登录
      data:
        user_name: ${get_login_user()}
        passwd: ${get_login_pass()}
      validation:
        - contains: { msg: 登录成功 }
        - contains: { msg_code: 200 }
      extract:
        token: $.token
        userId: $.userId

- baseInfo:
    api_name: 获取商品列表
    url: /coupApply/cms/goodsList
    method: GET
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
  testCase:
    - case_name: 电商流程-商品列表
      params:
        msgType: getHandsetListOfCust
      validation:
        - contains: { error_code: '0000' }
      extract:
        goodsIds: $.goodsList[*].goodsId

- baseInfo:
    api_name: 商品详情
    url: /coupApply/cms/productDetail
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 电商流程-商品详情
      json:
        pro_id: ${get_extract_data(goodsIds,0)}
      validation:
        - contains: { error_code: '0000' }

- baseInfo:
    api_name: 校验库存
    url: /coupApply/cms/shoppingInventory
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 电商流程-校验库存
      json:
        goodsId: ${get_extract_data(goodsIds,0)}
        count: 2
      validation:
        - contains: { status: '0' }

- baseInfo:
    api_name: 提交订单
    url: /coupApply/cms/placeAnOrder
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 电商流程-提交订单
      json:
        goods_id: ${get_extract_data(goodsIds,0)}
        number: 2
        price: '99.00'
        consignee_info:
          name: 张三
          phone: 13800000000
          address: 北京市海淀区
      validation:
        - contains: { message: 提交订单成功 }
      extract:
        orderNumber: $.orderNumber

- baseInfo:
    api_name: 订单支付
    url: /coupApply/cms/orderPay
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 电商流程-订单支付
      json:
        orderNumber: ${get_extract_data(orderNumber)}
        userId: ${get_extract_data(userId)}
      validation:
        - contains: { message: 订单支付成功 }

- baseInfo:
    api_name: 校验订单状态
    url: /coupApply/cms/checkOrderStatus
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 电商流程-校验订单状态
      json:
        orderNumber: ${get_extract_data(orderNumber)}
      validation:
        - contains: { status: '0' }
