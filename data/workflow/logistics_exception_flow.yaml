- baseInfo:
    api_name: 异常-创建运单
    url: /logistics/create
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 异常流程-创建运单
      json:
        goodsId: '33809635011'
        quantity: 1
        fromAddr: 上海
        toAddr: 广州
        consignee: 李四
      validation:
        - contains: { msg_code: 200 }
      extract:
        waybillNo: $.waybillNo

- baseInfo:
    api_name: 异常-创建后上报异常
    url: /logistics/exception
    method: POST
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 创建后上报异常
      json:
        waybillNo: ${get_extract_data(waybillNo)}
        exceptionType: DAMAGE
        description: 破损
      validation:
        - contains: { msg_code: 200 }
        - contains: { status: EXCEPTION }

