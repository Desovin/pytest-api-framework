[pytest]
# pytest 主配置

# 测试用例发现规则：test_*.py 或 *_test.py
python_files = test_*.py
# 以Test 开头的类
python_classes = Test*
python_functions = test_*

# 自定义 marker 注册
# serial: 标记不能并发的用例（数据库写操作、共享文件 extract.yaml 的链路用例）
markers =
    serial: 串行执行，不可并发（数据库写操作、业务链路用例）

# addopts ：pytest 运行时的自动附加的命令行参数
# --alluredir: Allure 报告原始数据输出目录（临时文件）
# --clean-alluredir: 每次运行前清空旧数据（避免旧数据干扰）
# --reruns 1: 失败用例自动重试 1 次（应对网络抖动等 flaky 场景）
# --reruns-delay 0.5 : 每次重试间隔 0.5 秒
# --junitxml=./report/results.xml: 生成 JUnit XML 报告，方便 CI 工具解析
addopts = -v --alluredir=./report/temp --clean-alluredir --reruns 1 --reruns-delay 0.5 --junitxml=./report/results.xml

# 并发说明：
# pytest-xdist 通过命令行 -n 控制，如：pytest -n auto
# 并发只适用于读接口；写接口请打 @pytest.mark.serial 标记
# 当前 extract.yaml 是文件级共享，多进程并发写入可能冲突，
# 所以带接口依赖的链路用例也建议标记 serial

# 日志配置

# 是否控制台实时显示日志
log_cli = false
# 日志文件路径
log_file = logs/pytest.log
# 日志最低级别
log_file_level = DEBUG
